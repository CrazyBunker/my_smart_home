- name: 'Температура в комнате'
  hub: hub1
  scale: 0.1
  precision: 1
  slave: 1
  register: 3
  register_type: holding
  device_class: temperature
  unit_of_measurement: °C
- name: 'Влажность в комнате'
  hub: hub1
  scale: 1
  precision: 0
  slave: 1
  register: 4
  register_type: holding
  device_class: humidity
  unit_of_measurement: "%"
